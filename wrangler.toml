name = "universal-ps-guide"
main = ".output/server/index.js"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "universal-ps-guide"
database_id = "323130c2-329a-4eea-b2af-e1ead7239c7e"
migrations_dir = "drizzle"

[vars]
# better-auth secret — generate with: openssl rand -base64 32
# AUTH_SECRET = "replace-with-a-random-base64-encoded-32-byte-secret"

AUTH_GITHUB_ID = "Ov23lizb0JlTyniOkxZC"

# GitHub OAuth app credentials (set as Wrangler secrets in production)
# Run: wrangler secret put AUTH_GITHUB_ID
#      wrangler secret put AUTH_GITHUB_SECRET

[observability]
[observability.logs]
enabled = true
invocation_logs = true
