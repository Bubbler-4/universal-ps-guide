name = "universal-ps-guide"
main = ".output/server/index.js"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "universal-ps-guide"
# Override this placeholder with the correct D1 database ID for each environment.
# Run `wrangler d1 create universal-ps-guide` to create the database and get its ID.
database_id = "00000000-0000-0000-0000-000000000000"
migrations_dir = "drizzle"

[vars]
# Auth secret — generate with: node -e "console.log(require('crypto').randomBytes(32).toString('base64url'))"
# AUTH_SECRET = "replace-with-a-random-32-char-secret"

# GitHub OAuth app credentials (set as Wrangler secrets in production)
# Run: wrangler secret put AUTH_GITHUB_ID
#      wrangler secret put AUTH_GITHUB_SECRET

# Firebase project credentials (set as Wrangler secrets in production)
# Run: wrangler secret put FIREBASE_API_KEY
#      wrangler secret put FIREBASE_PROJECT_ID

[observability]
[observability.logs]
enabled = true
invocation_logs = true
